name: Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: node wake-up.js
        env:
          BARK_KEY: ${{ secrets.BARK_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }} 
