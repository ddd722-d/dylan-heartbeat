name: Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 发送 Bark 推送（multipart/form-data）
        run: |
          curl -X POST "${{ secrets.BARK_URL }}" \
            -F "title=测试" \
            -F "msg=来自GitHub Actions的推送" \
            -F "token=${{ secrets.BARK_TOKEN }}" \
            -F "issecure=0"
      
      - run: npm install
      - run: timeout 10s node wake_up.js || echo "Timeout"
        env:
          BARK_KEY: ${{ secrets.BARK_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
