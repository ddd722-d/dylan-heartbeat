name: Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: pwd
      - run: ls -la
      - run: find . -name "wake_up.js"   # 保留这一行，确认文件存在
      - run: cat wake_up.js              # 打印脚本内容，便于分析
      - run: cat package.json
      - run: npm install
      - run: timeout 10s node wake_up.js || echo "Timeout or error"
        env:
          BARK_KEY: ${{ secrets.BARK_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
